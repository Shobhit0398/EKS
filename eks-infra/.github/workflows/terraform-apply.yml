name: Terraform Apply

on:

  push:

    branches:

      - main

jobs:

  apply:

    runs-on: self-hosted

    defaults:

      run:

        working-directory: eks-infra

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - run: terraform apply -auto-approve